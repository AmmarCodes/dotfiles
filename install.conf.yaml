- defaults:
    link:
      relink: true
      create: true

- link:
    ~/.gitconfig: git/gitconfig
    ~/.npmrc: npmrc
    ~/.aerospace.toml: aerospace.toml
    ~/.gitconfig-gitlab: git/gitconfig-gitlab
    ~/.gitignore: git/gitignore
    ~/.tmux.conf: tmux/tmux.conf
    ~/.config/tmux/tmux-nerd-font-window-name.yml: tmux/tmux-nerd-font-window-name.yml
    ~/.ripgreprc: ripgreprc
    ~/.config/karabiner.edn: karabiner.edn
    ~/.config/zed/settings.json: zed/settings.json
    ~/.config/borders/bordersrc: bordersrc
    ~/.config/worktrunk/config.toml: worktrunk/config.toml
    ~/.config/topgrade.toml: topgrade.toml
    ~/.config/lazy-mcp/servers.json: opencode/lazy-mcp-servers.json
    # ~/.config/kitty/kitty.conf: kitty.conf
    ~/.config/opencode: opencode
    ~/.pi/: pi
    ~/.agents/skills: skills
    ~/Library/Application Support/lazygit/config.yml: lazygit/config.yml
    ~/Library/Application Support/VSCodium/User/settings.json: vscodium/settings.json
    ~/.config/fish/:
      glob: true
      force: true
      path: fish/**
    ~/.config/nvim/: nvim
    ~/.config/ghostty/:
      glob: true
      force: true
      path: ghostty/**
    ~/.config/bat/: bat
    ~/.config/yazi/: yazi
    ~/.config/atuin/: atuin
    ~/.config/sketchybar/: sketchybar
    ~/Library/Application Support/espanso: espanso
    ~/.config/mise/: mise

- shell:
    - description: "Install must-haves brew packages"
      command: "brew bundle install --file ~/.dotfiles/Brewfile"
    - description: "Install fisher - fish plugin manager"
      command: "curl -sL https://raw.githubusercontent.com/jorgebucaran/fisher/main/functions/fisher.fish | source && fisher install jorgebucaran/fisher"
    - description: "Installing submodules"
      command: "git submodule update --init --recursive"
    - description: "Installing brew packages using ~/.dotfiles/Brewfile"
      command: "if command -v brew > /dev/null; then brew bundle --file=~/.dotfiles/Brewfile; fi"
    - description: "Seeding Brewfile.local from example if missing"
      command: "[ -f ~/.dotfiles/Brewfile.local ] || cp ~/.dotfiles/Brewfile.local.example ~/.dotfiles/Brewfile.local"
    - description: "Installing local brew packages from ~/.dotfiles/Brewfile.local"
      command: "if command -v brew > /dev/null; then brew bundle --file=~/.dotfiles/Brewfile.local; fi"
    - description: "Installing tmux plugin manager"
      command: "if test ! -d ~/.tmux/plugins/tpm; then git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins; fi"
    - description: "Installing SBarLua"
      command: "(git clone https://github.com/FelixKratz/SbarLua.git /tmp/SbarLua && cd /tmp/SbarLua/ && make install && rm -rf /tmp/SbarLua/)"
    - description: "Installing sketchybar font"
      command: "curl -L https://github.com/kvndrsslr/sketchybar-app-font/releases/download/latest/sketchybar-app-font.ttf -o $HOME/Library/Fonts/sketchybar-app-font.ttf"
    - description: "Install npm packages in sketchybar items"
      command: "if type -q npm; then cd ~/.config/sketchybar/items/ && npm install; fi"
